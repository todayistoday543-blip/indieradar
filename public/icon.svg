<svg width="32" height="32" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="16" fill="#141416"/>

  <!-- Letter I (slab serif, Times-style) -->
  <!-- Top serif -->
  <rect x="5" y="14" width="30" height="9" fill="#E8E0D4"/>
  <!-- Stem -->
  <rect x="14.5" y="14" width="11" height="78" fill="#E8E0D4"/>
  <!-- Bottom serif -->
  <rect x="5" y="83" width="30" height="9" fill="#E8E0D4"/>

  <!-- Letter R — bowl only (leg replaced by gold arrow) -->
  <!-- Stem -->
  <rect x="43" y="14" width="11" height="78" fill="#E8E0D4"/>
  <!-- Bowl: filled rounded rect with dark knockout -->
  <rect x="43" y="14" width="52" height="49" rx="7" fill="#E8E0D4"/>
  <rect x="55" y="23" width="31" height="28" rx="4" fill="#141416"/>

  <!-- Gold growth arrow (replaces R's diagonal leg) -->
  <!-- Body -->
  <line x1="58" y1="63" x2="101" y2="17" stroke="#D4A24A" stroke-width="9" stroke-linecap="square"/>
  <!-- Arrowhead -->
  <polygon points="108,11 112,31 93,26" fill="#D4A24A"/>
</svg>
